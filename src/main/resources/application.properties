spring.application.name=QuickPoll

# 1. Connection URL (Variables stay the same)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&enabledTLSProtocols=TLSv1.2
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 2. Driver & Hibernate Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. NEW DIALECT NAME (Universal for Hibernate 6/7)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Port & Connection Stability
server.port=${PORT:8080}
spring.datasource.hikari.initialization-fail-timeout=0